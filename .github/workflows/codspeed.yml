name: CodSpeed

on:
  push:
    branches:
      - main
  pull_request:
  # Allows CodSpeed to trigger backtest performance analysis to generate initial data.
  workflow_dispatch:

# Cancel superseded runs for the same PR to save runner time.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

# Make cargo network access more resilient to transient CI failures: retry crates.io
# downloads and fetch git dependencies (e.g. kompari) via the more reliable git CLI.
env:
  CARGO_NET_RETRY: "3"
  CARGO_NET_GIT_FETCH_WITH_CLI: "true"
  RUSTUP_MAX_RETRIES: "3"

jobs:
  benchmarks:
    name: Run scene benchmarks
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # for OpenID Connect authentication with CodSpeed
    steps:
      - uses: actions/checkout@v4

      # parley (pulled in via vello_example_scenes/vello_bench) links system fontconfig on Linux.
      - name: Install system dependencies
        run: sudo apt-get update; sudo apt-get install --no-install-recommends libfontconfig-dev

      - name: Setup rust toolchain, cache and cargo-codspeed binary
        uses: moonrepo/setup-rust@v0
        with:
          channel: stable
          cache-target: release
          bins: cargo-codspeed

      # Build only the `scenes` bench target so CodSpeed tracks just the scene workloads.
      - name: Build the scene benchmarks
        run: cargo codspeed build -p vello_bench --bench scenes

      - name: Run the benchmarks
        uses: CodSpeedHQ/action@v4
        with:
          mode: simulation
          run: cargo codspeed run
