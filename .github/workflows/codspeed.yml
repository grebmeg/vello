name: CodSpeed

on:
  push:
    branches:
      - main
  pull_request:
  # Allows CodSpeed to trigger backtest performance analysis to generate initial data.
  workflow_dispatch:

# Cancel superseded runs for the same PR to save runner time.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  benchmarks:
    name: Run scene benchmarks
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # for OpenID Connect authentication with CodSpeed
    steps:
      - uses: actions/checkout@v4

      - name: Setup rust toolchain, cache and cargo-codspeed binary
        uses: moonrepo/setup-rust@v0
        with:
          channel: stable
          cache-target: release
          bins: cargo-codspeed

      # Build only the `scenes` bench target so CodSpeed tracks just the scene workloads.
      - name: Build the scene benchmarks
        run: cargo codspeed build -p vello_bench --bench scenes

      - name: Run the benchmarks
        uses: CodSpeedHQ/action@v4
        with:
          mode: simulation
          run: cargo codspeed run
